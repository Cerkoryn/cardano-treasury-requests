name: Refresh proposal data

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-proposal-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Compile Python fetcher
        run: python -m py_compile fetch_cardano_budget_proposals.py

      - name: Refresh proposal data
        run: npm run refresh:data

      - name: Build app
        run: npm run build

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/proposals-sankey.json; then
            echo "No proposal data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/proposals-sankey.json
          git commit -m "Refresh proposal data"
          git push
